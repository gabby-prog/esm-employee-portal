<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Elite Sports Management | Employee Access</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand-lockup" aria-label="Elite Sports Management logo">
      <img class="brand-logo-small" src="assets/esm-logo.png" alt="Elite Sports Management logo" />
      <div>
        <div class="brand-name">Elite Sports Management</div>
        <div class="brand-subtitle">Employee Access</div>
      </div>
    </div>
    <nav class="top-actions site-nav">
      <a class="nav-link" href="index.html">Home</a>
      <a class="nav-link" href="employee-access.html">Employee Access</a>
      <a class="nav-link" href="pto-request.html">PTO Request</a>
      <a class="nav-link" href="benefits-guide.html">Benefits Guide</a>
      <a class="nav-link primary-nav" href="admin-dashboard.html">Admin Mode</a>
    </nav>
  </header>

  <main>
    <section id="employeeSearch" class="panel employee-facing access-panel">
      <div class="section-title centered">
        <div>
          <h2>Access Your Benefits Profile</h2>
          <p>Enter your name and birthday PIN. Birthday PIN format is MMDD, such as 0315 for March 15.</p>
        </div>
      </div>
      <div class="access-card">
        <div class="search-row secure-search">
          <input id="employeeSearchInput" type="search" placeholder="Employee name" oninput="renderEmployeeSearch()" />
          <input id="employeePinInput" type="password" inputmode="numeric" maxlength="4" placeholder="Birthday PIN (MMDD)" oninput="renderEmployeeSearch()" />
          <button class="primary" onclick="renderEmployeeSearch()">View My Benefits</button>
        </div>
        <div class="hint-line">For privacy, employee profiles require a matching name and birthday PIN.</div>
      </div>
      <div id="employeeSearchResults" class="results"></div>
      <div id="employeeProfile" class="profile"></div>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
